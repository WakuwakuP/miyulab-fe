name: Trigger Cursor Automation

# Re-evaluates required PR checks when CI or external commit statuses finish.
# - check_suite: GitHub Actions and other Check Run integrations
# - status: Vercel (and similar) commit statuses without Check Run UI
on:
  check_suite:
    types: [completed]
  status:

concurrency:
  group: cursor-automation-${{ github.event.check_suite.head_sha || github.event.sha }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  trigger-on-required-checks-completed:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cursor Automation when required checks finish
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          CHECK_SUITE_HEAD_SHA: ${{ github.event.check_suite.head_sha }}
          CHECK_SUITE_HEAD_BRANCH: ${{ github.event.check_suite.head_branch }}
          STATUS_SHA: ${{ github.event.sha }}
          STATUS_STATE: ${{ github.event.state }}
          STATUS_CONTEXT: ${{ github.event.context }}
          CURSOR_AUTOMATION_WEBHOOK_URL: ${{ vars.CURSOR_AUTOMATION_WEBHOOK_URL }}
          CURSOR_AUTOMATION_WEBHOOK_API_KEY: ${{ secrets.CURSOR_AUTOMATION_WEBHOOK_API_KEY }}
        run: |
          set -euo pipefail

          HEAD_SHA=""
          HEAD_BRANCH=""
          TRIGGER_SOURCE=""

          case "${GITHUB_EVENT_NAME}" in
            check_suite)
              HEAD_SHA="${CHECK_SUITE_HEAD_SHA:-}"
              HEAD_BRANCH="${CHECK_SUITE_HEAD_BRANCH:-}"
              TRIGGER_SOURCE="check_suite"
              ;;
            status)
              HEAD_SHA="${STATUS_SHA:-}"
              TRIGGER_SOURCE="status"

              if [ "${STATUS_STATE:-}" = "pending" ]; then
                echo "Commit status still pending (context: ${STATUS_CONTEXT:-unknown}). Skipping."
                exit 0
              fi

              # Vercel uses commit statuses (e.g. "Vercel" or "Vercel – project-name"), not Check Runs.
              CONTEXT_LOWER=$(printf '%s' "${STATUS_CONTEXT:-}" | tr '[:upper:]' '[:lower:]')
              if ! printf '%s' "$CONTEXT_LOWER" | grep -q '^vercel'; then
                echo "Status context '${STATUS_CONTEXT:-}' is not Vercel. Skipping."
                exit 0
              fi

              echo "Vercel commit status finished: context='${STATUS_CONTEXT}' state='${STATUS_STATE}'"
              ;;
            *)
              echo "Unsupported event: ${GITHUB_EVENT_NAME}"
              exit 1
              ;;
          esac

          if [ -z "${HEAD_SHA}" ]; then
            echo "No head SHA resolved from ${TRIGGER_SOURCE} event. Skipping."
            exit 0
          fi

          echo "Trigger source: ${TRIGGER_SOURCE} (sha=${HEAD_SHA})"

          if [ -z "${HEAD_BRANCH}" ]; then
            HEAD_BRANCH=$(gh api \
              "/repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/pulls" \
              --jq '.[0].head.ref // empty' 2>/dev/null || true)
          fi

          if [ -z "${HEAD_BRANCH}" ]; then
            HEAD_BRANCH=$(gh pr list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --json headRefName,headRefOid \
              --jq ".[] | select(.headRefOid==\"${HEAD_SHA}\") | .headRefName" \
              | head -n1)
          fi

          if [ -z "${HEAD_BRANCH}" ]; then
            echo "No pull request branch found for commit ${HEAD_SHA}. Skipping."
            exit 0
          fi

          PR_JSON=$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --head "${HEAD_BRANCH}" \
            --state open \
            --json number,author,isDraft,url \
            --limit 1)

          if [ "$(echo "$PR_JSON" | jq 'length')" -eq 0 ]; then
            echo "No open pull request for branch ${HEAD_BRANCH}. Skipping."
            exit 0
          fi

          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number')
          PR_AUTHOR_LOGIN=$(echo "$PR_JSON" | jq -r '.[0].author.login')
          PR_AUTHOR_TYPE=$(echo "$PR_JSON" | jq -r '.[0].author.type')
          PR_URL=$(echo "$PR_JSON" | jq -r '.[0].url')
          IS_DRAFT=$(echo "$PR_JSON" | jq -r '.[0].isDraft')

          echo "PR #${PR_NUMBER} (${PR_URL})"
          echo "PR author login: '${PR_AUTHOR_LOGIN}' (type: ${PR_AUTHOR_TYPE})"
          echo "Expected author login for trigger: 'app/cursor' (legacy: 'cursor[bot]')"
          echo "Draft: ${IS_DRAFT}"

          if [ "$PR_AUTHOR_LOGIN" != "app/cursor" ] && [ "$PR_AUTHOR_LOGIN" != "cursor[bot]" ]; then
            echo "Author check failed: login '${PR_AUTHOR_LOGIN}' is not an allowed Cursor author. Skipping."
            exit 0
          fi

          echo "Author check passed."

          REQUIRED_COUNT=$(gh pr checks "${PR_NUMBER}" \
            --repo "${GITHUB_REPOSITORY}" \
            --required \
            --json name \
            -q 'length')

          if [ "${REQUIRED_COUNT}" -eq 0 ]; then
            echo "No required checks configured for this PR. Skipping."
            exit 0
          fi

          set +e
          gh pr checks "${PR_NUMBER}" --repo "${GITHUB_REPOSITORY}" --required
          CHECKS_EXIT=$?
          set -e

          # gh pr checks: 0 = all passed, 1 = some failed (completed), 8 = still pending
          if [ "${CHECKS_EXIT}" -eq 8 ]; then
            echo "Required checks are still in progress. Skipping."
            exit 0
          fi

          if [ "${CHECKS_EXIT}" -ne 0 ] && [ "${CHECKS_EXIT}" -ne 1 ]; then
            echo "Unexpected gh pr checks exit code: ${CHECKS_EXIT}"
            exit 1
          fi

          CHECKS_PASSED="false"
          if [ "${CHECKS_EXIT}" -eq 0 ]; then
            CHECKS_PASSED="true"
          fi

          echo "All ${REQUIRED_COUNT} required check(s) completed (passed=${CHECKS_PASSED})"

          if [ -z "${CURSOR_AUTOMATION_WEBHOOK_URL:-}" ] || [ -z "${CURSOR_AUTOMATION_WEBHOOK_API_KEY:-}" ]; then
            echo "CURSOR_AUTOMATION_WEBHOOK_URL or CURSOR_AUTOMATION_WEBHOOK_API_KEY is not configured. Skipping."
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg event "github.required_checks.completed" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --argjson pr_number "$PR_NUMBER" \
            --arg pr_url "$PR_URL" \
            --arg head_sha "$HEAD_SHA" \
            --arg head_branch "$HEAD_BRANCH" \
            --arg trigger_source "$TRIGGER_SOURCE" \
            --argjson required_checks_passed "${CHECKS_PASSED}" \
            '{
              event: $event,
              repository: $repository,
              pull_request: {number: $pr_number, url: $pr_url},
              head_sha: $head_sha,
              head_branch: $head_branch,
              trigger_source: $trigger_source,
              required_checks: {
                completed: true,
                passed: $required_checks_passed
              }
            }')

          HTTP_CODE=$(curl -sS -o /tmp/cursor-automation-response.json -w "%{http_code}" \
            -X POST "${CURSOR_AUTOMATION_WEBHOOK_URL}" \
            -H "Authorization: Bearer ${CURSOR_AUTOMATION_WEBHOOK_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}")

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Cursor Automation webhook failed (HTTP ${HTTP_CODE})"
            cat /tmp/cursor-automation-response.json
            exit 1
          fi

          echo "Cursor Automation triggered successfully (HTTP ${HTTP_CODE})"
