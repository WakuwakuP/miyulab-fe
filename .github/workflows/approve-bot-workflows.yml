name: Auto Approve Bot Workflow Runs

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  approve:
    runs-on: ubuntu-latest
    if: >-
      github.actor == 'copilot[bot]' ||
      github.actor == 'github-actions[bot]' ||
      github.actor == 'dependabot[bot]'

    permissions:
      actions: write

    steps:
      - name: Approve Workflow Runs
        uses: WakuwakuP/approve-workflow-to-run@master
        with:
          github-token: ${{ secrets.APPROVE_WORKFLOW_TO_RUN_PAT }}
